name: Release

# Publish @bevyl-ai/agent-tools to npm when you publish a GitHub Release tagged `vX.Y.Z` (matching
# package.json), or on a manual run. Source-only TypeScript for bun consumers, so there's no build step —
# it ships src/ as-is. Auth/provenance come from the `npm` environment (trusted publishing + OIDC); set the
# trusted publisher on npmjs.com (package → Settings → Trusted Publisher → bevyl-ai/agent-tools).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish agent-tools to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # npm provenance / trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Check (typecheck + tests)
        run: bun run check

      - name: Guard version (tag matches package.json, not already published)
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          if [ -n "$TAG" ] && [ "$TAG" != "v$VERSION" ] && [ "$TAG" != "$VERSION" ]; then
            echo "::error::release tag '$TAG' must be 'v$VERSION' (or '$VERSION')"
            exit 1
          fi
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::error::$NAME@$VERSION is already on npm"
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
